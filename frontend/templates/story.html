{% extends "base.html" %}

{% block content %}
<section class="story-reading px-3 sm:px-6 md:px-8 py-4 sm:py-6 max-w-5xl mx-auto">
  <header class="story-reading-header flex items-center justify-between gap-2 mb-3 sm:mb-4">
    <div class="min-w-0 flex-1">
      <h1 id="story-title" class="text-lg sm:text-2xl md:text-3xl font-extrabold kid-text-main truncate"></h1>
      <p id="story-description" class="mt-0.5 text-xs sm:text-sm kid-text-muted line-clamp-2 sm:line-clamp-none"></p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <button id="config-toggle"
              class="kid-config-btn inline-flex items-center justify-center w-10 h-10 rounded-full shadow-md border-2 transition"
              title="Configuración de voz">
        ⚙
      </button>
    </div>
  </header>

  <div id="cuento-inicio" class="book-wrapper">
    <div class="book-outer">
      <div class="book-spread">
        <div class="book-page book-page-left">
          <div class="book-page-paper">
            <div id="story-cover" class="book-illustration kid-cover-placeholder">
            </div>
          </div>
        </div>
        <div class="book-page book-page-right">
          <div class="book-page-paper">
            <div id="karaoke-container" class="book-text">
            </div>
            <div class="book-page-footer">
              <span id="page-indicator" class="book-page-number">Página 1</span>
            </div>
          </div>
        </div>
      </div>
      <div id="book-play-overlay" class="book-play-overlay">
        <div class="flex flex-col items-center gap-2">
          <button id="btn-play-center" type="button" class="book-play-btn" title="Léeme el cuento">
            <span class="book-play-icon">▶</span>
          </button>
          <p class="kid-play-hint text-xs sm:text-sm rounded-full px-3 py-1 shadow-sm border">
            Sube el volumen y pulsa ▶ para empezar
          </p>
        </div>
      </div>
      <div id="book-quiz-overlay" class="book-quiz-overlay hidden">
        <div class="book-quiz-inner">
          <div class="book-quiz-header">
            <!-- Botón de reanudar eliminado para que no aparezca al responder cuestionario -->
          </div>
          <div id="book-quiz-body" class="book-quiz-body">
            <!-- Una pregunta a la vez + feedback + Siguiente -->
          </div>
          <div class="book-quiz-footer"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="story-controls">
    <button type="button" id="btn-prev" class="story-control-btn" title="Retroceder">
      <span class="story-control-btn-icon" aria-hidden="true">⏪</span>
      <span class="story-control-btn-label">Retroceder</span>
    </button>
    <button type="button" id="btn-pause-main" class="story-control-btn story-control-btn-pause" title="Silencio">
      <span class="story-control-btn-icon" aria-hidden="true">🔇</span>
      <span class="story-control-btn-label">Silencio</span>
    </button>
    <button type="button" id="btn-next" class="story-control-btn" title="Avanzar">
      <span class="story-control-btn-icon" aria-hidden="true">⏩</span>
      <span class="story-control-btn-label">Avanzar</span>
    </button>
    <a href="/" class="story-control-btn story-control-btn-back" title="Volver a la página principal">
      <span class="story-control-btn-icon" aria-hidden="true">←</span>
      <span class="story-control-btn-label">Volver</span>
    </a>
  </div>

  <div id="config-panel" class="kid-config-panel mt-3 backdrop-blur-xl rounded-2xl p-3 sm:p-4 shadow-lg border hidden text-xs sm:text-sm">
    <div class="grid gap-3 sm:grid-cols-3">
      <div>
        <label class="block mb-1 kid-label">Tipo de voz</label>
        <select id="voice-select" class="kid-input w-full rounded-xl border-2 px-3 py-1.5 text-xs sm:text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:border-[#2563EB]">
          <option value="">Automática</option>
        </select>
      </div>
      <div>
        <label class="block mb-1 kid-label">Velocidad</label>
        <div class="flex items-center gap-2">
          <input id="rate-range" type="range" min="0.5" max="1.5" step="0.25" value="1"
                 class="w-full kid-accent">
          <span id="rate-label" class="w-10 text-right kid-text-muted text-xs sm:text-sm">1x</span>
        </div>
      </div>
      <div>
        <label class="block mb-1 kid-label">Sonido</label>
        <select id="ambient-select" class="kid-input w-full rounded-xl border-2 px-3 py-1.5 text-xs sm:text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:border-[#2563EB]">
          <option value="">Ninguno</option>
          <option value="bosque">Bosque suave</option>
          <option value="mar">Olas del mar</option>
          <option value="noche">Noche estrellada</option>
        </select>
      </div>
    </div>
    <div class="flex flex-wrap gap-2 mt-3">
      <button id="btn-pause" class="btn-control bg-amber-400 text-white">
        🔇 Silencio
      </button>
      <button id="btn-stop" class="btn-control bg-rose-500 text-white">
        ⏹ Detener
      </button>
      <button id="btn-repeat" class="btn-control bg-sky-500 text-white">
        🔁 Repetir
      </button>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  window.STORY_ID = {{ story_id }};
</script>
<script src="/static/js/story.js?v=8"></script>
{% endblock %}
