{% extends "base.html" %}

{% block content %}
<section class="px-4 sm:px-8 py-10 flex justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl p-6 sm:p-8 shadow-2xl border border-white/70">
      <h1 class="text-xl sm:text-2xl font-extrabold text-purple-900 mb-2">Panel de administración</h1>
      <p class="text-xs sm:text-sm text-purple-900/70 mb-4">
        Inicia sesión para gestionar cuentos, escenas e imágenes.
      </p>
      {% if error %}
      <div class="mb-3 text-xs sm:text-sm text-rose-600 bg-rose-50 border border-rose-100 rounded-2xl px-3 py-2">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/admin/login" class="space-y-4 text-sm">
        <div>
          <label class="block mb-1 text-purple-900/80">Clave de acceso</label>
          <input name="password" type="password" required
                 class="w-full rounded-full border border-purple-100 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-300">
        </div>
        <button type="submit"
                class="w-full mt-2 inline-flex justify-center items-center px-4 py-2 rounded-full bg-gradient-to-r from-purple-500 via-pink-500 to-sky-500 text-white font-semibold shadow-lg shadow-purple-300/60 hover:scale-[1.01] active:scale-[0.99] transition">
          Entrar al panel
        </button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
